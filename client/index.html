  <body>

    <!-- Debug helper: append ?showInsets=1 to URL to display computed nav/mobile-menu insets on device -->
    <script>
      (function(){
        try{
          if(!location.search.includes('showInsets=1')) return;
          function fmt(v){return v?v.trim():v}
          const overlay = document.createElement('div');
          Object.assign(overlay.style,{
            position:'fixed',right:'8px',top:'8px',zIndex:9999,background:'rgba(0,0,0,0.7)',color:'#fff',padding:'8px 10px',borderRadius:'6px',fontSize:'12px',fontFamily:'sans-serif',maxWidth:'240px',lineHeight:'1.3'
          });
          overlay.id='debug-insets-overlay';
          overlay.innerText = 'measuring...';
          document.addEventListener('DOMContentLoaded',update, {once:true});
          function update(){
            var nav = document.querySelector('nav');
            var menu = document.querySelector('.mobile-menu');
            var csNav = nav?getComputedStyle(nav):null;
            var csMenu = menu?getComputedStyle(menu):null;
            var values = [];
            values.push('nav.top: ' + (csNav? fmt(csNav.getPropertyValue('top')) : 'n/a'));
            values.push('nav.height: ' + (csNav? fmt(csNav.getPropertyValue('height')) : 'n/a'));
            values.push('mobile-menu.top: ' + (csMenu? fmt(csMenu.getPropertyValue('top')) : 'n/a'));
            values.push('window.innerHeight: ' + window.innerHeight + 'px');
            values.push('visualViewport.height: ' + (window.visualViewport? window.visualViewport.height + 'px' : 'n/a'));
            overlay.innerText = values.join('\n');
          }
          document.body.appendChild(overlay);
          // update on orientation/resize
          window.addEventListener('resize', update);
          if(window.visualViewport){ window.visualViewport.addEventListener('resize', update); }
        }catch(e){console.warn('debug insets helper failed',e)}
      })();
    </script>
  </body>
